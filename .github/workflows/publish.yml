name: Publish VS Code extension

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

concurrency:
  group: vscode-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Package and publish
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: marketplace
    env:
      VSIX_PATH: array-scope-${{ github.event.release.tag_name }}.vsix

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"
          if [[ "$release_version" != "$package_version" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $package_version." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test, build, and package
        run: npm run package -- --out "$VSIX_PATH"

      - name: Sign in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish to the VS Code Marketplace
        run: npx vsce publish --azure-credential --packagePath "$VSIX_PATH" --skip-duplicate

      - name: Attach VSIX to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$VSIX_PATH" --clobber
